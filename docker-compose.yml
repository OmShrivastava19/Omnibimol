services:
  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    ports:
      - "8501:8501"
    environment:
      AUTH_ENABLED: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/omnibimol
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      AUTH_ENABLED: "false"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/omnibimol
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: omnibimol
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
