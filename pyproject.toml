[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["backend", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []
per-file-ignores = { "alembic/versions/*.py" = ["E501"], "backend/api/routes/*.py" = ["B008"], "backend/auth/dependencies.py" = ["B008"], "backend/auth/rbac.py" = ["B008"], "tests/test_portfolio_engine.py" = ["E501"], "tests/test_target_prioritization_engine.py" = ["E501", "B007"], "tests/test_wet_lab_handoff_engine.py" = ["E501"] }

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
files = ["backend"]
